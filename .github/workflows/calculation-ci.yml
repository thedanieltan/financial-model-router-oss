name: Calculation acceptance CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Calculation acceptance Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev-ui,test-ui,executor]"
      - name: Run calculation acceptance tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest \
            tests.test_calculation \
            tests.test_cli_calculation \
            tests.test_api_calculation \
            tests.test_calculation_workbench \
            tests.test_contracts -v 2>&1 | tee calculation-test-output.txt
      - name: Preserve calculation failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: calculation-test-output-python-${{ matrix.python-version }}
          path: calculation-test-output.txt
          if-no-files-found: error
          retention-days: 7
      - run: python -m compileall -q fmr
      - run: python -m fmr calculation-engine-status --help
      - run: python -m fmr calculate-output --help
      - run: python -m fmr accept-calculated-output --help
      - run: python -m fmr validate-calculation-acceptance --help
      - name: Confirm no workbook binaries are committed
        run: |
          if find . -type f \( -iname '*.xlsx' -o -iname '*.xlsm' -o -iname '*.xlsb' -o -iname '*.xls' -o -iname '*.xltx' -o -iname '*.xltm' -o -iname '*.ods' \) -print -quit | grep -q .; then
            echo "Workbook binary found in repository" >&2
            exit 1
          fi

  package:
    name: Build wheel and smoke-test calculation acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/fmr-calculation-package
          WHEEL="$(ls dist/*.whl)"
          /tmp/fmr-calculation-package/bin/pip install "${WHEEL}[dev-ui,test-ui,executor]"
      - name: Verify packaged contracts and browser module
        run: |
          cd /tmp
          /tmp/fmr-calculation-package/bin/python - <<'PY'
          from importlib.resources import files

          for name in (
              "workbook-calculation-request.v1.schema.json",
              "workbook-calculation-result.v1.schema.json",
              "external-calculation-acceptance-request.v1.schema.json",
              "workbook-calculation-acceptance.v1.schema.json",
          ):
              assert files("fmr.contracts").joinpath(name).is_file(), name
          assert files("fmr.web").joinpath("calculation.js").is_file()
          import fmr.workbook.calculation_public  # noqa: F401
          PY
      - name: Run installed-wheel external acceptance smoke
        env:
          FMR_REPO: ${{ github.workspace }}
        run: |
          cd /tmp
          /tmp/fmr-calculation-package/bin/python - <<'PY'
          import json
          import os
          import sys

          sys.path.insert(0, os.environ["FMR_REPO"])
          from tests.calculation_case import populated_execution_case
          from fmr.workbook import (
              accept_calculated_workbook_bytes,
              validate_workbook_calculation_acceptance_payload,
          )

          populated, write_plan, execution_receipt = populated_execution_case()
          acceptance = accept_calculated_workbook_bytes(
              populated,
              populated,
              input_filename="populated.xlsx",
              output_filename="uncalculated.xlsx",
              write_plan=write_plan,
              execution_receipt=execution_receipt,
              engine={
                  "name": "external-package-smoke",
                  "version": "test-only",
                  "adapter": "external-calculation.v1",
              },
          )
          assert acceptance["status"] == "failed"
          assert acceptance["summary"]["missing_cached_value_count"] > 0
          assert validate_workbook_calculation_acceptance_payload(
              acceptance,
              write_plan=write_plan,
              execution_receipt=execution_receipt,
          ) == ()
          forbidden = {"value", "calculated_value", "cached_value", "before_value", "after_value"}
          def keys(item):
              if isinstance(item, dict):
                  for key, value in item.items():
                      yield key
                      yield from keys(value)
              elif isinstance(item, list):
                  for value in item:
                      yield from keys(value)
          assert forbidden.isdisjoint(set(keys(acceptance)))
          print(json.dumps({"status": acceptance["status"], "acceptance_id": acceptance["acceptance_id"]}))
          PY
      - name: Start composed local service and check calculation assets
        run: |
          /tmp/fmr-calculation-package/bin/fmr serve --port 8768 >/tmp/fmr-calculation-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID} 2>/dev/null || true' EXIT
          /tmp/fmr-calculation-package/bin/python - <<'PY'
          import time
          import urllib.request

          urls = (
              "http://127.0.0.1:8768/health",
              "http://127.0.0.1:8768/api/v1/calculation-engine",
              "http://127.0.0.1:8768/assets/calculation.js",
          )
          last_error = None
          for _ in range(30):
              try:
                  for url in urls:
                      with urllib.request.urlopen(url, timeout=1) as response:
                          assert response.status == 200
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(0.2)
          else:
              raise SystemExit(f"service did not become ready: {last_error}")
          PY

  libreoffice:
    name: Live LibreOffice calculated-output acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install LibreOffice Calc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-calc
          libreoffice --version
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Install wheel with executor extra
        run: |
          python -m venv /tmp/fmr-calculation-live
          WHEEL="$(ls dist/*.whl)"
          /tmp/fmr-calculation-live/bin/pip install "${WHEEL}[executor]"
      - name: Generate populated workbook and accepted source contracts
        env:
          FMR_REPO: ${{ github.workspace }}
        run: |
          cd /tmp
          /tmp/fmr-calculation-live/bin/python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, os.environ["FMR_REPO"])
          from tests.calculation_case import populated_execution_case

          populated, write_plan, execution_receipt = populated_execution_case(input_value=7)
          Path("/tmp/populated.xlsx").write_bytes(populated)
          Path("/tmp/write-plan.json").write_text(json.dumps(write_plan), encoding="utf-8")
          Path("/tmp/execution-receipt.json").write_text(
              json.dumps(execution_receipt), encoding="utf-8"
          )
          PY
      - name: Recalculate, accept and validate with installed CLI
        shell: bash
        run: |
          set -o pipefail
          cd /tmp
          /tmp/fmr-calculation-live/bin/fmr calculation-engine-status \
            2>&1 | tee /tmp/calculation-engine-status.json
          /tmp/fmr-calculation-live/bin/fmr calculate-output \
            /tmp/populated.xlsx \
            /tmp/write-plan.json \
            /tmp/execution-receipt.json \
            --output /tmp/calculated.xlsx \
            --receipt /tmp/calculation-acceptance.json \
            --timeout 180 2>&1 | tee /tmp/calculation-command-output.txt
          /tmp/fmr-calculation-live/bin/fmr validate-calculation-acceptance \
            /tmp/calculation-acceptance.json \
            --write-plan /tmp/write-plan.json \
            --execution-receipt /tmp/execution-receipt.json
      - name: Preserve value-free live calculation failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-calculation-acceptance-failure
          path: |
            /tmp/calculation-acceptance.json
            /tmp/calculation-engine-status.json
            /tmp/calculation-command-output.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Verify live acceptance boundary
        run: |
          /tmp/fmr-calculation-live/bin/python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          from openpyxl import load_workbook

          populated = Path("/tmp/populated.xlsx").read_bytes()
          calculated = Path("/tmp/calculated.xlsx").read_bytes()
          acceptance = json.loads(
              Path("/tmp/calculation-acceptance.json").read_text(encoding="utf-8")
          )
          assert acceptance["status"] == "passed", acceptance
          assert acceptance["summary"]["missing_cached_value_count"] == 0
          assert acceptance["summary"]["workbook_formula_error_count"] == 0
          assert acceptance["summary"]["immutable_failure_count"] == 0
          assert hashlib.sha256(populated).hexdigest() == acceptance["input"]["sha256"]
          assert hashlib.sha256(calculated).hexdigest() == acceptance["output"]["sha256"]
          assert populated != calculated
          forbidden = {"value", "calculated_value", "cached_value", "before_value", "after_value"}
          def keys(item):
              if isinstance(item, dict):
                  for key, value in item.items():
                      yield key
                      yield from keys(value)
              elif isinstance(item, list):
                  for value in item:
                      yield from keys(value)
          assert forbidden.isdisjoint(set(keys(acceptance)))
          workbook = load_workbook("/tmp/calculated.xlsx", data_only=True)
          try:
              assert workbook.sheetnames
          finally:
              workbook.close()
          PY
      - name: Confirm no workbook binaries are committed
        run: |
          cd "${{ github.workspace }}"
          if find . -type f \( -iname '*.xlsx' -o -iname '*.xlsm' -o -iname '*.xlsb' -o -iname '*.xls' -o -iname '*.xltx' -o -iname '*.xltm' -o -iname '*.ods' \) -print -quit | grep -q .; then
            echo "Workbook binary found in repository" >&2
            exit 1
          fi
