name: Provider SDK CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean-wheel-provider-sdk:
    name: Clean wheel generated provider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build --wheel
      - name: Install FMR wheel and scaffold provider
        run: |
          python -m venv /tmp/fmr-sdk-test
          /tmp/fmr-sdk-test/bin/pip install "$(ls dist/*.whl)"
          /tmp/fmr-sdk-test/bin/fmr-provider init sdk-ci-provider /tmp/sdk-ci-provider
          /tmp/fmr-sdk-test/bin/fmr-provider validate /tmp/sdk-ci-provider
      - name: Install and execute generated provider
        run: |
          /tmp/fmr-sdk-test/bin/pip install --no-deps /tmp/sdk-ci-provider
          cd /tmp
          /tmp/fmr-sdk-test/bin/fmr-provider test /tmp/sdk-ci-provider --output /tmp/sdk-conformance.json
          /tmp/fmr-sdk-test/bin/fmr-provider package /tmp/sdk-ci-provider --destination /tmp/sdk-dist --output /tmp/sdk-package.json
          /tmp/fmr-sdk-test/bin/fmr-registry --registry /tmp/provider-registry.json submit \
            /tmp/sdk-ci-provider/manifest.json /tmp/sdk-conformance.json /tmp/sdk-package.json
          /tmp/fmr-sdk-test/bin/fmr-registry --registry /tmp/provider-registry.json transition sdk-ci-provider 0.1.0 active
          /tmp/fmr-sdk-test/bin/fmr-registry --registry /tmp/provider-registry.json audit
          /tmp/fmr-sdk-test/bin/python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          receipt = json.loads(Path("/tmp/sdk-package.json").read_text())
          payload = Path(receipt["path"]).read_bytes()
          assert receipt["contract_version"] == "provider-sdk-package-result.v1"
          assert receipt["sha256"] == hashlib.sha256(payload).hexdigest()
          PY
