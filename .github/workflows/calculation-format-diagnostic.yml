name: Temporary calculation format diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Inspect LibreOffice number-format normalization
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install LibreOffice Calc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-calc
      - run: python -m pip install -e ".[executor]"
      - name: Generate metadata-only diagnostic
        run: |
          python - <<'PY'
          import json
          from io import BytesIO
          from pathlib import Path

          from openpyxl import load_workbook

          from fmr.workbook import calculate_and_accept_workbook_bytes
          from fmr.workbook.executor import _cells
          from tests.calculation_case import populated_execution_case

          populated, write_plan, execution_receipt = populated_execution_case(input_value=7)
          result = calculate_and_accept_workbook_bytes(
              populated,
              input_filename="populated.xlsx",
              output_filename="calculated.xlsx",
              write_plan=write_plan,
              execution_receipt=execution_receipt,
              timeout_seconds=180,
          )
          record_map = {
              record["record_id"]: record
              for phase in write_plan["phases"]
              for record in phase["records"]
          }
          workbook = load_workbook(BytesIO(result.output_bytes), data_only=False)
          try:
              diagnostics = []
              for failure in result.receipt["immutable_verification"]["failures"]:
                  record = record_map.get(failure["record_id"])
                  if not record:
                      continue
                  cells = list(_cells(workbook[record["sheet_name"]], record["coordinate"]))
                  style = record.get("payload", {}).get("style", {})
                  diagnostics.append({
                      "record_id": record["record_id"],
                      "write_kind": record["write_kind"],
                      "sheet_name": record["sheet_name"],
                      "coordinate": record["coordinate"],
                      "issue_code": failure["issue_code"],
                      "semantic_type": style.get("semantic_type"),
                      "expected_number_format": style.get("number_format", {}).get("code"),
                      "observed_number_formats": sorted({cell.number_format for cell in cells}),
                      "expected_locked": style.get("role_style", {}).get("protection", {}).get("locked"),
                      "observed_locked": sorted({cell.protection.locked for cell in cells}),
                  })
          finally:
              workbook.close()
          Path("/tmp/calculation-format-diagnostic.json").write_text(
              json.dumps({
                  "status": result.receipt["status"],
                  "summary": result.receipt["summary"],
                  "diagnostics": diagnostics,
              }, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: calculation-format-diagnostic
          path: /tmp/calculation-format-diagnostic.json
          if-no-files-found: error
          retention-days: 1
