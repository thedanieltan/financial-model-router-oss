name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev-ui,test-ui]"
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee unit-test-output.txt
      - name: Preserve unit-test failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output-python-${{ matrix.python-version }}
          path: unit-test-output.txt
          if-no-files-found: error
          retention-days: 7
      - run: python -m compileall -q fmr
      - run: python -m fmr route tests/fixtures/request-dcf-ready.json
      - run: python -m fmr plan tests/fixtures/request-debt-blocked.json
      - run: python -m fmr inspect --help
      - run: python -m fmr serve --help

  package:
    name: Build package and smoke-test workbench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Install wheel and verify packaged assets
        run: |
          python -m venv /tmp/fmr-package-test
          WHEEL="$(ls dist/*.whl)"
          /tmp/fmr-package-test/bin/pip install "${WHEEL}[dev-ui,test-ui]"
          cd /tmp
          /tmp/fmr-package-test/bin/fmr --help
          /tmp/fmr-package-test/bin/python - <<'PY'
          from importlib.resources import files
          assert files("fmr.contracts").joinpath("transformation-plan.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-map.v1.schema.json").is_file()
          assert files("fmr.web").joinpath("index.html").is_file()
          assert files("fmr.web").joinpath("app.js").is_file()
          assert files("fmr.fixtures").joinpath("dcf-ready.json").is_file()
          PY
      - name: Inspect a generated XLSX from the installed wheel
        run: |
          cd /tmp
          /tmp/fmr-package-test/bin/python - <<'PY'
          import io
          import zipfile
          from pathlib import Path

          content_types = '''<?xml version="1.0" encoding="UTF-8"?>
          <Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
            <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
            <Default Extension="xml" ContentType="application/xml"/>
            <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
            <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
          </Types>'''
          package_rels = '''<?xml version="1.0" encoding="UTF-8"?>
          <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
            <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
          </Relationships>'''
          workbook = '''<?xml version="1.0" encoding="UTF-8"?>
          <workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
            <sheets><sheet name="Income Statement" sheetId="1" r:id="rId1"/></sheets>
          </workbook>'''
          workbook_rels = '''<?xml version="1.0" encoding="UTF-8"?>
          <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
            <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
          </Relationships>'''
          sheet = '''<?xml version="1.0" encoding="UTF-8"?>
          <worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
            <dimension ref="A1:C3"/><sheetData>
              <row r="1"><c r="A1" t="inlineStr"><is><t>Income Statement</t></is></c></row>
              <row r="2"><c r="B2"><v>2025</v></c><c r="C2" t="inlineStr"><is><t>2026E</t></is></c></row>
              <row r="3"><c r="A3" t="inlineStr"><is><t>Revenue</t></is></c><c r="B3"><v>100</v></c><c r="C3"><f>B3*1.1</f><v>110</v></c></row>
            </sheetData>
          </worksheet>'''
          path = Path("/tmp/fmr-smoke.xlsx")
          with zipfile.ZipFile(path, "w", zipfile.ZIP_DEFLATED) as archive:
              archive.writestr("[Content_Types].xml", content_types)
              archive.writestr("_rels/.rels", package_rels)
              archive.writestr("xl/workbook.xml", workbook)
              archive.writestr("xl/_rels/workbook.xml.rels", workbook_rels)
              archive.writestr("xl/worksheets/sheet1.xml", sheet)
          PY
          /tmp/fmr-package-test/bin/fmr inspect /tmp/fmr-smoke.xlsx --output /tmp/fmr-smoke-map.json
          /tmp/fmr-package-test/bin/python - <<'PY'
          import json
          payload = json.load(open("/tmp/fmr-smoke-map.json", encoding="utf-8"))
          assert payload["contract_version"] == "workbook-map.v1"
          assert payload["sheets"][0]["candidate_role"]["value"] == "income_statement"
          assert payload["sheets"][0]["formula_cells"] == 1
          PY
      - name: Start local server and check health
        run: |
          /tmp/fmr-package-test/bin/fmr serve --port 8765 >/tmp/fmr-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID} 2>/dev/null || true' EXIT
          /tmp/fmr-package-test/bin/python - <<'PY'
          import json
          import time
          import urllib.request

          url = "http://127.0.0.1:8765/health"
          last_error = None
          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      payload = json.load(response)
                  assert payload["status"] == "ok"
                  assert payload["service"] == "financial-model-router"
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(0.2)
          else:
              raise SystemExit(f"server did not become ready: {last_error}")
          PY
