name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev-ui,test-ui]"
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee unit-test-output.txt
      - name: Preserve unit-test failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output-python-${{ matrix.python-version }}
          path: unit-test-output.txt
          if-no-files-found: error
          retention-days: 7
      - run: python -m compileall -q fmr
      - run: python -m fmr route tests/fixtures/request-dcf-ready.json
      - run: python -m fmr plan tests/fixtures/request-debt-blocked.json
      - run: python -m fmr inspect --help
      - run: python -m fmr analyse-workbook --help
      - run: python -m fmr compile-patch --help
      - run: python -m fmr validate-patch --help
      - run: python -m fmr validate-patch-receipt --help
      - run: python -m fmr operation-specs --help
      - run: python -m fmr resolve-targets --help
      - run: python -m fmr validate-target-resolution --help
      - run: python -m fmr serve --help

  package:
    name: Build package and smoke-test workbench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Install wheel and verify packaged assets
        run: |
          python -m venv /tmp/fmr-package-test
          WHEEL="$(ls dist/*.whl)"
          /tmp/fmr-package-test/bin/pip install "${WHEEL}[dev-ui,test-ui]"
          cd /tmp
          /tmp/fmr-package-test/bin/fmr --help
          /tmp/fmr-package-test/bin/python - <<'PY'
          from importlib.resources import files
          assert files("fmr.contracts").joinpath("transformation-plan.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-map.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-analysis-request.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-analysis.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-patch.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-patch-receipt.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-operation-spec-registry.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-target-resolution-request.v1.schema.json").is_file()
          assert files("fmr.contracts").joinpath("workbook-target-resolution.v1.schema.json").is_file()
          assert files("fmr.web").joinpath("index.html").is_file()
          assert files("fmr.web").joinpath("app.js").is_file()
          assert files("fmr.fixtures").joinpath("dcf-ready.json").is_file()
          PY
      - name: Inspect, analyse, compile and resolve from the installed wheel
        run: |
          cd /tmp
          /tmp/fmr-package-test/bin/python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          content_types = '''<?xml version="1.0" encoding="UTF-8"?>
          <Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
            <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
            <Default Extension="xml" ContentType="application/xml"/>
            <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
            <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
          </Types>'''
          package_rels = '''<?xml version="1.0" encoding="UTF-8"?>
          <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
            <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
          </Relationships>'''
          workbook = '''<?xml version="1.0" encoding="UTF-8"?>
          <workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
            <sheets><sheet name="Income Statement" sheetId="1" r:id="rId1"/></sheets>
          </workbook>'''
          workbook_rels = '''<?xml version="1.0" encoding="UTF-8"?>
          <Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
            <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
          </Relationships>'''
          sheet = '''<?xml version="1.0" encoding="UTF-8"?>
          <worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
            <dimension ref="A1:D3"/><sheetData>
              <row r="1"><c r="A1" t="inlineStr"><is><t>Income Statement</t></is></c></row>
              <row r="2"><c r="B2"><v>2024</v></c><c r="C2"><v>2025</v></c><c r="D2" t="inlineStr"><is><t>2026E</t></is></c></row>
              <row r="3"><c r="A3" t="inlineStr"><is><t>Revenue</t></is></c><c r="B3"><v>100</v></c><c r="C3"><v>110</v></c><c r="D3"><f>C3*1.1</f><v>121</v></c></row>
            </sheetData>
          </worksheet>'''
          path = Path("/tmp/fmr-smoke.xlsx")
          with zipfile.ZipFile(path, "w", zipfile.ZIP_DEFLATED) as archive:
              archive.writestr("[Content_Types].xml", content_types)
              archive.writestr("_rels/.rels", package_rels)
              archive.writestr("xl/workbook.xml", workbook)
              archive.writestr("xl/_rels/workbook.xml.rels", workbook_rels)
              archive.writestr("xl/worksheets/sheet1.xml", sheet)

          request = {
              "contract_version": "model-request.v1",
              "objective": "build a budget forecast",
              "role": "finance_manager",
              "available_data": [
                  "balance_sheet_history",
                  "revenue_drivers",
                  "operating_cost_drivers"
              ],
              "workbook_capabilities": [],
              "assumptions": ["forecast_horizon"]
          }
          Path("/tmp/fmr-smoke-request.json").write_text(
              json.dumps(request),
              encoding="utf-8",
          )
          PY
          /tmp/fmr-package-test/bin/fmr inspect /tmp/fmr-smoke.xlsx --output /tmp/fmr-smoke-map.json
          /tmp/fmr-package-test/bin/fmr analyse-workbook /tmp/fmr-smoke.xlsx /tmp/fmr-smoke-request.json --output /tmp/fmr-smoke-analysis.json
          /tmp/fmr-package-test/bin/fmr compile-patch /tmp/fmr-smoke-analysis.json --output /tmp/fmr-smoke-patch.json
          /tmp/fmr-package-test/bin/fmr validate-patch /tmp/fmr-smoke-patch.json
          /tmp/fmr-package-test/bin/fmr operation-specs --output /tmp/fmr-operation-specs.json
          /tmp/fmr-package-test/bin/fmr resolve-targets /tmp/fmr-smoke-analysis.json /tmp/fmr-smoke-patch.json --output /tmp/fmr-target-resolution.json
          /tmp/fmr-package-test/bin/fmr validate-target-resolution /tmp/fmr-target-resolution.json --analysis /tmp/fmr-smoke-analysis.json --patch /tmp/fmr-smoke-patch.json
          /tmp/fmr-package-test/bin/python - <<'PY'
          import json
          workbook_map = json.load(open("/tmp/fmr-smoke-map.json", encoding="utf-8"))
          analysis = json.load(open("/tmp/fmr-smoke-analysis.json", encoding="utf-8"))
          patch = json.load(open("/tmp/fmr-smoke-patch.json", encoding="utf-8"))
          registry = json.load(open("/tmp/fmr-operation-specs.json", encoding="utf-8"))
          resolution = json.load(open("/tmp/fmr-target-resolution.json", encoding="utf-8"))
          assert workbook_map["contract_version"] == "workbook-map.v1"
          assert analysis["contract_version"] == "workbook-analysis.v1"
          assert analysis["recommendation"]["readiness"]["ready"] is True
          assert patch["contract_version"] == "workbook-patch.v1"
          assert patch["ready_for_executor"] is True
          assert patch["execution_supported_by_this_release"] is False
          assert registry["contract_version"] == "workbook-operation-spec-registry.v1"
          assert resolution["contract_version"] == "workbook-target-resolution.v1"
          assert resolution["patch_id"] == patch["patch_id"]
          assert resolution["operation_specs_sha256"] == registry["registry_sha256"]
          assert resolution["ready_for_executor"] is True
          assert resolution["execution_supported_by_this_release"] is False
          assert all(item["status"] != "blocked" for item in resolution["resolutions"])
          assert patch["source"]["sha256"] == workbook_map["source"]["sha256"]
          operation_ids = [item["operation_id"] for item in patch["operations"]]
          rollback_ids = [item["operation_id"] for item in patch["rollback_plan"]]
          assert rollback_ids == list(reversed(operation_ids))
          PY
      - name: Start local server and check health
        run: |
          /tmp/fmr-package-test/bin/fmr serve --port 8765 >/tmp/fmr-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID} 2>/dev/null || true' EXIT
          /tmp/fmr-package-test/bin/python - <<'PY'
          import json
          import time
          import urllib.request

          url = "http://127.0.0.1:8765/health"
          last_error = None
          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      payload = json.load(response)
                  assert payload["status"] == "ok"
                  assert payload["service"] == "financial-model-router"
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(0.2)
          else:
              raise SystemExit(f"server did not become ready: {last_error}")
          PY
