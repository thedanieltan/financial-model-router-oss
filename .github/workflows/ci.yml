name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q fmr
      - run: python -m fmr route tests/fixtures/request-dcf-ready.json
      - run: python -m fmr plan tests/fixtures/request-debt-blocked.json

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: |
          python -m venv /tmp/fmr-package-test
          /tmp/fmr-package-test/bin/pip install dist/*.whl
          cd /tmp
          /tmp/fmr-package-test/bin/fmr --help
          /tmp/fmr-package-test/bin/python -c 'from importlib.resources import files; assert files("fmr.contracts").joinpath("transformation-plan.v1.schema.json").is_file()'
